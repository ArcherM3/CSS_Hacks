<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusFix Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <h1 class="logo">CampusResolve</h1>
    <p class="tagline">Report. Track. Resolve.</p>

    <form onsubmit="handleLogin(event)">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="College Email" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>

    <p class="note">Use your college email only</p>
  </div>
</div>

<script>
  async function handleLogin(event) {
    event.preventDefault();

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const params = new URLSearchParams(window.location.search);
    const role = params.get("role") || "student"; 

    const endpoint = role === "admin" 
      ? "https://web-wizards-backend.onrender.com/auth/login/admin"
      : "https://web-wizards-backend.onrender.com/auth/login/student";

    const payload = {
        username: username,
        college_email: email,
        password: password
    };

    try {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      
      const data = await response.json();
      if (response.ok) {
        localStorage.setItem("loggedIn", "true");
        // token key might be 'token', 'access_token', etc.
        const token = data.token || data.access_token || data["authentication token"];
        if(role === "admin") {
          if(token) localStorage.setItem("adminToken", token);
          localStorage.setItem("userRole", "admin");
          try {
            const pRes = await fetch("https://web-wizards-backend.onrender.com/admin/me", {headers: {"Authorization": "Bearer " + token}});
            if(pRes.ok) { const pData = await pRes.json(); if(pData.avatar) localStorage.setItem("userAvatar", pData.avatar); }
          } catch(e) {}
          window.location.href = "admin-profile.html";
        } else {
          if(token) localStorage.setItem("studentToken", token);
          localStorage.setItem("userRole", "student");
          try {
            const pRes = await fetch("https://web-wizards-backend.onrender.com/student/me", {headers: {"Authorization": "Bearer " + token}});
            if(pRes.ok) { const pData = await pRes.json(); if(pData.avatar) localStorage.setItem("userAvatar", pData.avatar); }
          } catch(e) {}
          window.location.href = "home_page.html";
        }
      } else {
        alert(data.detail || "Login failed");
      }
    } catch(err) {
      alert("Error connecting to server");
      console.error(err);
    }
  }
</script>

</body>
</html>
