<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Issue Management</title>
    <link rel="stylesheet" href="complaint.css">
</head>
<body>

    <div class="navbar">
    <div class="nav-left">
        <span class="menu-icon">☰</span>
        <span class="logo">CampusResolve</span>
    </div>

    <div class="nav-right">
        <a href="home_page.html">Home</a>
        <a href="complaint.html" class="active">Raise a Complaint</a>
        <a href="dept.html">Departments</a>
        <span class="dots">•••</span>
    </div>
</div>
<!-- Header -->
<div class="header">
    <div class="header-icon">!</div>
    <div class="header-text">
        <h1>Raise a Complaint</h1>
        <p>Submit your issue and it will be automatically routed to the concerned department.</p>
    </div>
</div>

<!-- Main Container -->
 <div class="container">
    <!-- <div class="title">Raise a Complaint</div>
    <div class="subtitle">
        Submit your issue and it will be automatically routed to the concerned department.
    </div> --> 

    <form>
        <div class="form-row">
            <div class="form-group">
                <label>Full Name <span>*</span></label>
                <input type="text" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Scholar ID <span>*</span></label>
                <input type="text" placeholder="e.g. 25CS10072`  `">
            </div>
        

         <div class="form-group">
        <label>Phone Number <span>*</span></label>
        <input type="number" placeholder="Enter your phone number">
    </div>
</div>

        <div class="form-group mb">
            <label>Concerned Department <span>*</span></label>
            <select>
                <option>Select department</option>
                <option>Hostel</option>
                <option>Mess</option>
                <option>Infrastructure</option> 
                <option>Academic</option>
                <option>Administration</option>
                <option>IT</option>
                <option>Transport</option>
                <option>Security</option>
                <option>Anti-Ragging Cell</option>
                <option>Personal</option>
                <option>Others</option>
               
            </select>
        </div>

        <div class="form-group mb">
    <label>Problem Title <span>*</span></label>
    <input type="text" placeholder="Enter a short title for the issue">
</div>
        <div class="form-group">
            <label>Problem Description <span>*</span></label>
            <textarea placeholder="Describe the issue in detail..."></textarea>
            <div class="char-count">0/1000</div>
        </div>

        <div class="form-group">
            <label>Attach Files (optional)</label>
            <div class="upload-box">
                <div class="upload-icon">⬆️</div>
                <div class="upload-text">Click to upload images or documents</div>
                <div class="upload-sub">Max 5 files</div>
            </div>
        </div>

        <button class="btn">✈ Submit Complaint</button>
    </form>
</div>

</body>
</html>
