<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Signup</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="navbar.css">
</head>

<body>

   <!-- Navbar -->
  <header class="navbar solid">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="CampusResolve" class="logo-img"> <span>CampusResolve</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="complaint.html">Raise a complaint</a>
      <a href="dept1.html">Departments</a>

      <span id="auth-section">
        <a href="role.html" class="login-btn">Login</a>
        <a href="signup2.html" class="sign_up-btn">Sign Up</a>
      </span>

      <span id="profile-section">
        <a href="stud-profile.html" id="profile-link">
          <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="profile-icon-img" class="profile-icon" alt="Profile">
        </a>
      </span>
    </nav>
  </header>

<div class="container">
    <h2>Sign up as a student</h2>
    <form id="signupForm">
    <label>Name</label>
    <input type="text" name="username" pattern="[A-Za-z ]+" title="Name should only contain letters" required>

    <label>College email</label>
    <input type="email" name="college_email" pattern=".+@nits\.ac\.in" title="Email must end with @nits.ac.in" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <label>Scholar ID</label>
    <input type="text" name="sch_id" required>

    <label>Phone Number</label>
    <input type="text" name="phone" pattern="\d{10}" title="Phone number should be exactly 10 digits" required>

    <div class="photo-upload">
        <button class="photo-btn" type="button">Add Your Photo</button>
        <button class="plus-btn" type="button">+</button>
    </div>
<button class="signup-btn" type="submit">Sign Up</button>
    <a href="admin-signup.html" class="admin-link">Sign up as an Admin</a>
</div>
<script src="navbar.js"></script>
<script src="signup2.js"></script>
</body>
</html>
