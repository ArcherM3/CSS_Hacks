<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusFix Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="navbar.css">
</head>
<body>

   <!-- Navbar -->
  <header class="navbar solid">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="CampusResolve" class="logo-img"> <span>CampusResolve</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="complaint.html">Raise a complaint</a>
      <a href="dept1.html">Departments</a>

      <span id="auth-section">
        <a href="role.html" class="login-btn">Login</a>
        <a href="signup2.html" class="sign_up-btn">Sign Up</a>
      </span>

      <span id="profile-section">
        <a href="stud-profile.html" id="profile-link">
          <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="profile-icon-img" class="profile-icon" alt="Profile">
        </a>
      </span>
    </nav>
  </header>

<div class="login-container">
  <div class="login-card">
    <h1 class="logo">CampusResolve</h1>
    <p class="tagline">Report. Track. Resolve.</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="College Email" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>
    
    <p id="message"></p>

    <p class="note">Use your college email only</p>
  </div>
</div>

<script src="navbar.js"></script>
<script>
  async function handleLogin(event) {
    event.preventDefault();

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    // Determine role based on email domain
    const role = email.endsWith("@nits.ac.in") ? "student" : "admin";

    const endpoint = role === "student" 
      ? "https://web-wizards-backend.onrender.com/auth/login/student" 
      : "https://web-wizards-backend.onrender.com/auth/login/admin";

    try {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: username,
          college_email: email,
          password: password
        })
      });

      const data = await response.json();

      if (response.ok) {
        message.style.color = "green";
        message.innerText = data.message || "Login successful!";
        
        // Store essential data
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role || role);
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", username);
        
        // Fetch full profile to get avatar
        await fetchProfile(data.token, data.role || role);

        setTimeout(() => {
            window.location.href = (data.role || role) === "admin" ? "admin-profile.html" : "index.html";
        }, 1000);
      } else {
        message.style.color = "red";
        message.innerText = data.detail || "Login failed";
      }
    } catch (error) {
      console.error("Login Error:", error);
      message.style.color = "red";
      message.innerText = "Server error!";
    }
  }

  async function fetchProfile(token, role) {
    try {
      const endpoint = role === "admin" 
        ? "https://web-wizards-backend.onrender.com/admin/me" 
        : "https://web-wizards-backend.onrender.com/student/me";
        
      const response = await fetch(endpoint, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (response.ok) {
        const profile = await response.json();
        if (profile.avatar) localStorage.setItem("avatar", profile.avatar);
        if (profile.username) localStorage.setItem("username", profile.username);
        if (profile.sch_id) localStorage.setItem("sch_id", profile.sch_id);
      }
    } catch (e) {
      console.error("Profile fetch error:", e);
    }
  }
</script>
</body>
</html>
